function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch {} return null; }
function saveData(a) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(a)); } catch {} }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function daysUntil(d) { if (!d) return null; return Math.ceil((new Date(d) - new Date()) / 86400000); }

};

function StatsDashboard({ apps }) {
  const urgentCount = apps.filter(a => { const d = daysUntil(a.deadline); return d !== null && d >= 0 && d <= 3 && a.stage !== "closed"; }).length;
  const activeCount = apps.filter(a => a.stage !== "closed" && a.stage !== "wishlist").length;
  const interviewCount = apps.filter(a => a.stage === "interview").length;
  const closedCount = apps.filter(a => a.stage === "closed").length;
  const stats = [
    { label: "总申请", value: apps.length, color: P.accent },
    { label: "进行中", value: activeCount, color: "#51CF66" },
    { label: "面试中", value: interviewCount, color: "#FCC419" },
    { label: "3天内截止", value: urgentCount, color: urgentCount > 0 ? "#FF6B6B" : P.textMuted },
    { label: "已归档", value: closedCount, color: "#9F7AEA" },
  ];
  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
      {stats.map(s => (
        <div key={s.label} style={{ background: P.surface, border: `1px solid ${P.border}`, borderRadius: 10, padding: "12px 20px", minWidth: 100, flex: 1 }}>
          <div style={{ fontSize: 11, color: P.textMuted, marginBottom: 4, letterSpacing: "0.5px", textTransform: "uppercase" }}>{s.label}</div>
          <div style={{ fontSize: 26, fontWeight: 700, color: s.color, fontFamily: MONO }}>{s.value}</div>
        </div>
      ))}
    </div>
  );
}

function PriorityBadge({ priority, small }) {
  const c = PRIORITY_CONFIG[priority]; if (!c) return null;
  return <span style={{ display: "inline-block", fontSize: small ? 10 : 11, fontWeight: 700, color: c.color, background: c.bg, border: `1px solid ${c.border}`, borderRadius: 4, padding: small ? "1px 5px" : "2px 8px", letterSpacing: "0.3px", fontFamily: MONO }}>{c.label}</span>;
}

function DeadlineTag({ deadline }) {
  const d = daysUntil(deadline); if (d === null) return null;
  let color = P.textMuted, text = "";
  if (d < 0) { text = "已过期"; } else if (d === 0) { color = "#FF6B6B"; text = "今天截止！"; }
  else if (d <= 3) { color = "#FF6B6B"; text = `${d}天后截止`; }
  else if (d <= 7) { color = "#FCC419"; text = `${d}天后截止`; }
  else { color = P.textSecondary; text = `${d}天后`; }
  return <span style={{ fontSize: 11, color, fontFamily: MONO, fontWeight: d <= 3 ? 700 : 400 }}>⏰ {text}</span>;
}

function InterviewProgressMini({ rounds }) {
  if (!rounds || !rounds.length) return null;
  return (
    <div style={{ display: "flex", gap: 3, alignItems: "center", marginTop: 6 }}>
      {rounds.map((r, i) => <div key={i} title={r.name} style={{ width: 18, height: 5, borderRadius: 3, background: r.status === "done" ? P.success : r.status === "current" ? P.accent : P.border, opacity: r.status === "done" ? 0.7 : 1 }} />)}
      <span style={{ fontSize: 10, color: P.textMuted, marginLeft: 4 }}>{rounds.find(r => r.status === "current")?.name || ""}</span>
    </div>
  );
}

function JourneyTimeline({ rounds, closedReason }) {
  if (!rounds || !rounds.length) return null;
  const rc = CLOSED_REASONS.find(r => r.id === closedReason);
  return (
    <div style={{ marginTop: 8, padding: "8px 0 2px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
        {rounds.map((r, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ fontSize: 10, color: r.status === "done" ? P.success : P.textMuted, fontWeight: 500, whiteSpace: "nowrap" }}>{r.name}</span>
            {i < rounds.length - 1 && <span style={{ fontSize: 9, color: P.textMuted }}>→</span>}
          </div>
        ))}
        {rc && (<><span style={{ fontSize: 9, color: P.textMuted }}>→</span><span style={{ fontSize: 10, fontWeight: 600, color: rc.color, whiteSpace: "nowrap" }}>{rc.icon} {rc.label}</span></>)}
      </div>
    </div>
  );
}

function KanbanCard({ app, onClick, onDragStart }) {
  const [hover, setHover] = useState(false);
  return (
    <div draggable onDragStart={e => { e.dataTransfer.setData("text/plain", app.id); onDragStart(app.id); }}
      onClick={() => onClick(app)} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ background: hover ? P.cardHover : P.card, border: `1px solid ${hover ? P.borderLight : P.border}`, borderRadius: 10, padding: "14px 16px", cursor: "grab", transition: "all 0.15s ease", borderLeft: `3px solid ${PRIORITY_CONFIG[app.priority]?.color || P.border}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: P.text, lineHeight: 1.3 }}>{app.company}</div>
        <PriorityBadge priority={app.priority} small />
      </div>
      <div style={{ fontSize: 12, color: P.textSecondary, marginBottom: 8 }}>{app.role}</div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 4 }}>
        {app.stage === "closed" ? (() => {
          const rc = CLOSED_REASONS.find(r => r.id === app.closedReason);
          return rc ? <span style={{ fontSize: 11, fontWeight: 600, color: rc.color }}>{rc.icon} {rc.label}</span>
            : <span style={{ fontSize: 11, color: P.textMuted }}>未标注结果</span>;
        })() : <DeadlineTag deadline={app.deadline} />}
        {app.source && <span style={{ fontSize: 10, color: P.textMuted, background: P.surface, padding: "2px 6px", borderRadius: 4 }}>{app.source}</span>}
      </div>
      {app.stage === "closed" ? <JourneyTimeline rounds={app.interviewRounds} closedReason={app.closedReason} />
        : <InterviewProgressMini rounds={app.interviewRounds} />}
      {app.resumeVersion && app.stage !== "closed" && (
        <div style={{ fontSize: 10, color: P.textMuted, marginTop: 6, display: "flex", alignItems: "center", gap: 4 }}><span>📄</span> {app.resumeVersion}</div>
      )}
    </div>
  );
}

function KanbanColumn({ column, apps, onCardClick, onDrop, onDragStart, onAddClick }) {
  const [dragOver, setDragOver] = useState(false);
  const sorted = [...apps].sort((a, b) => {
    const po = { P0: 0, P1: 1, P2: 2 };
    if (po[a.priority] !== po[b.priority]) return po[a.priority] - po[b.priority];
    const da = daysUntil(a.deadline), db = daysUntil(b.deadline);
    if (da === null && db === null) return 0; if (da === null) return 1; if (db === null) return -1;
    return da - db;
  });
  return (
    <div onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)}
      onDrop={e => { e.preventDefault(); setDragOver(false); onDrop(e.dataTransfer.getData("text/plain"), column.id); }}
      style={{ flex: "0 0 280px", display: "flex", flexDirection: "column", maxHeight: "100%" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, padding: "0 4px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 16 }}>{column.icon}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: P.text }}>{column.title}</span>
          <span style={{ fontSize: 11, color: P.textMuted, background: P.surface, borderRadius: 10, padding: "1px 7px", fontFamily: MONO, fontWeight: 600 }}>{apps.length}</span>
        </div>
        <button onClick={() => onAddClick(column.id)}
          style={{ width: 24, height: 24, borderRadius: 6, border: `1px solid ${P.border}`, background: "transparent", color: P.textMuted, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, lineHeight: 1, transition: "all 0.15s" }}
          onMouseEnter={e => { e.target.style.borderColor = P.accent; e.target.style.color = P.accent; }}
          onMouseLeave={e => { e.target.style.borderColor = P.border; e.target.style.color = P.textMuted; }}>+</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, padding: 4, borderRadius: 10, background: dragOver ? "rgba(108,140,255,0.06)" : "transparent", border: dragOver ? `1px dashed ${P.accent}` : "1px dashed transparent", transition: "all 0.2s", minHeight: 80 }}>
        {sorted.map(app => <KanbanCard key={app.id} app={app} onClick={onCardClick} onDragStart={onDragStart} />)}
      </div>
    </div>
  );
}

function DetailPanel({ app, onClose, onSave, onDelete }) {
  const [form, setForm] = useState({ ...app });
  const [activeTab, setActiveTab] = useState("info");
  const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const inputStyle = { width: "100%", padding: "8px 10px", borderRadius: 6, border: `1px solid ${P.border}`, background: P.surface, color: P.text, fontSize: 13, fontFamily: FONT, outline: "none", boxSizing: "border-box" };
  const labelStyle = { fontSize: 11, color: P.textMuted, marginBottom: 4, display: "block", letterSpacing: "0.3px" };
  const tabs = [{ id: "info", label: "基本信息" }, { id: "links", label: "链接" }, { id: "interview", label: "面试轮次" }, { id: "notes", label: "笔记" }];

  const addRound = () => {
    const rounds = [...(form.interviewRounds || [])];
    const next = INTERVIEW_ROUNDS.find(r => !rounds.some(x => x.name === r)) || "自定义";
    rounds.push({ name: next, status: "pending", date: "", notes: "" });
    update("interviewRounds", rounds);
  };
  const updateRound = (idx, key, val) => { const r = [...form.interviewRounds]; r[idx] = { ...r[idx], [key]: val }; update("interviewRounds", r); };
  const removeRound = idx => { const r = [...form.interviewRounds]; r.splice(idx, 1); update("interviewRounds", r); };

  return (
    <div style={{ position: "fixed", top: 0, right: 0, width: 480, maxWidth: "100vw", height: "100vh", background: P.bg, borderLeft: `1px solid ${P.border}`, zIndex: 1000, display: "flex", flexDirection: "column", boxShadow: "-8px 0 30px rgba(0,0,0,0.4)" }}>
      {/* Header */}
      <div style={{ padding: "16px 20px", borderBottom: `1px solid ${P.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{flex:1}}>
          <input value={form.company} onChange={e => update("company", e.target.value)} placeholder="公司名称"
            style={{ ...inputStyle, fontSize: 18, fontWeight: 700, border: "none", background: "transparent", padding: 0 }} />
          <input value={form.role} onChange={e => update("role", e.target.value)} placeholder="岗位名称"
            style={{ ...inputStyle, fontSize: 13, color: P.textSecondary, border: "none", background: "transparent", padding: 0, marginTop: 2 }} />
        </div>
        <button onClick={onClose} style={{ background: "transparent", border: "none", color: P.textMuted, fontSize: 22, cursor: "pointer", padding: 4 }}>✕</button>
      </div>

      {/* Priority + Stage */}
      <div style={{ padding: "12px 20px", borderBottom: `1px solid ${P.border}`, display: "flex", gap: 12 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>优先级</label>
          <select value={form.priority} onChange={e => update("priority", e.target.value)} style={{ ...inputStyle, cursor: "pointer" }}>
            {Object.entries(PRIORITY_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>当前阶段</label>
          <select value={form.stage} onChange={e => update("stage", e.target.value)} style={{ ...inputStyle, cursor: "pointer" }}>
            {DEFAULT_COLUMNS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.title}</option>)}
          </select>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: `1px solid ${P.border}`, padding: "0 20px" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ background: "transparent", border: "none", borderBottom: activeTab === t.id ? `2px solid ${P.accent}` : "2px solid transparent", color: activeTab === t.id ? P.text : P.textMuted, fontSize: 12, fontWeight: 600, padding: "10px 14px", cursor: "pointer", fontFamily: FONT, transition: "all 0.15s" }}>{t.label}</button>
        ))}
      </div>

      {/* Tab Content */}
      <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
        {activeTab === "info" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ display: "flex", gap: 12 }}>
              <div style={{ flex: 1 }}><label style={labelStyle}>截止日期</label><input type="date" value={form.deadline || ""} onChange={e => update("deadline", e.target.value)} style={inputStyle} /></div>
              <div style={{ flex: 1 }}><label style={labelStyle}>投递日期</label><input type="date" value={form.appliedDate || ""} onChange={e => update("appliedDate", e.target.value)} style={inputStyle} /></div>
            </div>
            <div><label style={labelStyle}>投递渠道</label>
              <select value={form.source || ""} onChange={e => update("source", e.target.value)} style={inputStyle}>
                <option value="">选择渠道</option><option value="官网">官网</option><option value="内推">内推</option><option value="猎头">猎头</option><option value="校招">校招</option><option value="学长/学姐">学长/学姐</option><option value="LinkedIn">LinkedIn</option><option value="其他">其他</option>
              </select>
            </div>
            <div><label style={labelStyle}>简历版本</label><input value={form.resumeVersion || ""} onChange={e => update("resumeVersion", e.target.value)} placeholder="如：PM版-国际化方向" style={inputStyle} /></div>

            {form.stage === "closed" && (<>
              <div style={{ borderTop: `1px solid ${P.border}`, paddingTop: 14, marginTop: 4 }}>
                <label style={{ ...labelStyle, fontSize: 12, fontWeight: 600, color: P.textSecondary }}>📋 归档信息</label>
              </div>
              <div><label style={labelStyle}>结束原因</label>
                <select value={form.closedReason || ""} onChange={e => update("closedReason", e.target.value)} style={inputStyle}>
                  <option value="">选择结束原因</option>
                  {CLOSED_REASONS.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
                </select>
              </div>
              <div><label style={labelStyle}>结束日期</label><input type="date" value={form.closedAt || ""} onChange={e => update("closedAt", e.target.value)} style={inputStyle} /></div>
              {form.interviewRounds && form.interviewRounds.length > 0 && (
                <div style={{ background: P.surface, border: `1px solid ${P.border}`, borderRadius: 8, padding: 12 }}>
                  <label style={{ ...labelStyle, marginBottom: 8 }}>完整申请旅程</label>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {form.interviewRounds.map((r, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: r.status === "done" ? P.success : P.textMuted, flexShrink: 0 }} />
                        <span style={{ fontSize: 12, color: P.text, fontWeight: 500, minWidth: 40 }}>{r.name}</span>
                        {r.date && <span style={{ fontSize: 11, color: P.textMuted, fontFamily: MONO }}>{r.date}</span>}
                        {r.notes && <span style={{ fontSize: 11, color: P.textSecondary }}>· {r.notes}</span>}
                      </div>
                    ))}
                    {form.closedReason && (() => {
                      const rc = CLOSED_REASONS.find(cr => cr.id === form.closedReason);
                      return rc ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 2 }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: rc.color, flexShrink: 0 }} />
                          <span style={{ fontSize: 12, color: rc.color, fontWeight: 600 }}>{rc.icon} {rc.label}</span>
                          {form.closedAt && <span style={{ fontSize: 11, color: P.textMuted, fontFamily: MONO }}>{form.closedAt}</span>}
                        </div>
                      ) : null;
                    })()}
                  </div>
                </div>
              )}
            </>)}
          </div>
        )}

        {activeTab === "links" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div><label style={labelStyle}>JD 链接</label><input value={form.jdLink || ""} onChange={e => update("jdLink", e.target.value)} placeholder="粘贴岗位描述链接" style={inputStyle} /></div>
            <div><label style={labelStyle}>公司官网</label><input value={form.companyLink || ""} onChange={e => update("companyLink", e.target.value)} placeholder="粘贴公司官网" style={inputStyle} /></div>
            <div><label style={labelStyle}>招聘进度查询</label><input value={form.portalLink || ""} onChange={e => update("portalLink", e.target.value)} placeholder="粘贴招聘官网进度页" style={inputStyle} /></div>
            {[form.jdLink, form.companyLink, form.portalLink].some(Boolean) && (
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 4 }}>
                {form.jdLink && <a href={form.jdLink} target="_blank" rel="noopener" style={{ color: P.accent, fontSize: 12, textDecoration: "none" }}>🔗 打开 JD</a>}
                {form.companyLink && <a href={form.companyLink} target="_blank" rel="noopener" style={{ color: P.accent, fontSize: 12, textDecoration: "none" }}>🔗 打开公司官网</a>}
                {form.portalLink && <a href={form.portalLink} target="_blank" rel="noopener" style={{ color: P.accent, fontSize: 12, textDecoration: "none" }}>🔗 查看申请进度</a>}
              </div>
            )}
          </div>
        )}

        {activeTab === "interview" && (
          <div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {(form.interviewRounds || []).map((round, idx) => (
                <div key={idx} style={{ background: P.surface, border: `1px solid ${round.status === "current" ? P.accentBorder : P.border}`, borderRadius: 8, padding: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <select value={round.name} onChange={e => updateRound(idx, "name", e.target.value)} style={{ ...inputStyle, width: "auto", padding: "4px 8px", fontSize: 12, fontWeight: 600 }}>
                        {INTERVIEW_ROUNDS.map(r => <option key={r} value={r}>{r}</option>)}<option value="自定义">自定义</option>
                      </select>
                      <select value={round.status} onChange={e => updateRound(idx, "status", e.target.value)} style={{ ...inputStyle, width: "auto", padding: "4px 8px", fontSize: 11, color: round.status === "done" ? P.success : round.status === "current" ? P.accent : P.textMuted }}>
                        <option value="pending">待进行</option><option value="current">当前</option><option value="done">已完成</option>
                      </select>
                    </div>
                    <button onClick={() => removeRound(idx)} style={{ background: "transparent", border: "none", color: P.textMuted, cursor: "pointer", fontSize: 14 }}>✕</button>
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input type="date" value={round.date || ""} onChange={e => updateRound(idx, "date", e.target.value)} style={{ ...inputStyle, flex: "0 0 140px", fontSize: 12, padding: "4px 8px" }} />
                    <input value={round.notes || ""} onChange={e => updateRound(idx, "notes", e.target.value)} placeholder="备注（题型、重点等）" style={{ ...inputStyle, flex: 1, fontSize: 12, padding: "4px 8px" }} />
                  </div>
                </div>
              ))}
            </div>
            <button onClick={addRound} style={{ marginTop: 10, width: "100%", padding: "8px", borderRadius: 6, border: `1px dashed ${P.border}`, background: "transparent", color: P.textMuted, fontSize: 12, cursor: "pointer", fontFamily: FONT, transition: "all 0.15s" }}
              onMouseEnter={e => { e.target.style.borderColor = P.accent; e.target.style.color = P.accent; }}
              onMouseLeave={e => { e.target.style.borderColor = P.border; e.target.style.color = P.textMuted; }}>+ 添加轮次</button>
          </div>
        )}

        {activeTab === "notes" && (
          <div><label style={labelStyle}>准备笔记 / 复盘</label>
            <textarea value={form.notes || ""} onChange={e => update("notes", e.target.value)} placeholder="面试准备要点、复盘记录、弹药库..." rows={12} style={{ ...inputStyle, resize: "vertical", minHeight: 200, lineHeight: 1.6 }} />
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ padding: "12px 20px", borderTop: `1px solid ${P.border}`, display: "flex", justifyContent: "space-between" }}>
        <button onClick={() => onDelete(form.id)} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${P.border}`, background: "transparent", color: P.danger, fontSize: 12, cursor: "pointer", fontFamily: FONT }}>删除申请</button>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onClose} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${P.border}`, background: "transparent", color: P.textSecondary, fontSize: 12, cursor: "pointer", fontFamily: FONT }}>取消</button>
          <button onClick={() => onSave(form)} style={{ padding: "8px 20px", borderRadius: 6, border: "none", background: P.accent, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>保存</button>
        </div>
      </div>
    </div>
  );
}

function Backdrop({ onClick }) {
  return <div onClick={onClick} style={{ position: "fixed", top: 0, left: 0, width: "100vw", height: "100vh", background: "rgba(0,0,0,0.5)", zIndex: 999 }} />;
}

function FilterBar({ filter, setFilter, sortBy, setSortBy, searchQuery, setSearchQuery }) {
  const btn = a => ({ padding: "5px 12px", borderRadius: 6, border: `1px solid ${a ? P.accentBorder : P.border}`, background: a ? P.accentSoft : "transparent", color: a ? P.accent : P.textMuted, fontSize: 12, cursor: "pointer", fontWeight: a ? 600 : 400, fontFamily: FONT, transition: "all 0.15s" });
  return (
    <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
      <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="搜索公司 / 岗位..."
        style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${P.border}`, background: P.surface, color: P.text, fontSize: 12, fontFamily: FONT, outline: "none", width: 180 }} />
      <div style={{ width: 1, height: 20, background: P.border, margin: "0 4px" }} />
      <button style={btn(filter === "all")} onClick={() => setFilter("all")}>全部</button>
      <button style={btn(filter === "P0")} onClick={() => setFilter("P0")}>P0 冲刺</button>
      <button style={btn(filter === "P1")} onClick={() => setFilter("P1")}>P1 重点</button>
      <button style={btn(filter === "P2")} onClick={() => setFilter("P2")}>P2 保底</button>
      <div style={{ flex: 1 }} />
      <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ padding: "5px 10px", borderRadius: 6, border: `1px solid ${P.border}`, background: P.surface, color: P.textSecondary, fontSize: 12, fontFamily: FONT, cursor: "pointer", outline: "none" }}>
        <option value="priority">按优先级排序</option><option value="deadline">按截止日期排序</option><option value="recent">按创建时间排序</option>
      </select>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function JobTracker() {
  const [apps, setApps] = useState(() => loadData() || SAMPLE_DATA);
  const [selectedApp, setSelectedApp] = useState(null);
  const [filter, setFilter] = useState("all");
  const [sortBy, setSortBy] = useState("priority");
  const [searchQuery, setSearchQuery] = useState("");
  const [draggingId, setDraggingId] = useState(null);

  useEffect(() => { saveData(apps); }, [apps]);

  const filteredApps = apps.filter(a => {
    if (filter !== "all" && a.priority !== filter) return false;
    if (searchQuery) { const q = searchQuery.toLowerCase(); return a.company.toLowerCase().includes(q) || a.role.toLowerCase().includes(q); }
    return true;
  });

  const handleDrop = (id, stage) => { setApps(prev => prev.map(a => a.id === id ? { ...a, stage } : a)); setDraggingId(null); };
  const handleSave = u => { setApps(prev => prev.map(a => a.id === u.id ? { ...u } : a)); setSelectedApp(null); };
  const handleDelete = id => { setApps(prev => prev.filter(a => a.id !== id)); setSelectedApp(null); };
  const handleAdd = stage => {
    const n = { id: genId(), company: "", role: "", priority: "P1", stage, deadline: "", appliedDate: "", source: "", jdLink: "", portalLink: "", companyLink: "", resumeVersion: "", interviewRounds: [], notes: "", closedReason: "", closedAt: "", createdAt: Date.now() };
    setApps(prev => [...prev, n]); setSelectedApp(n);
  };

  return (
    <div style={{ fontFamily: FONT, background: P.bg, color: P.text, minHeight: "100vh", padding: "20px 24px", boxSizing: "border-box" }}>
      <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0, letterSpacing: "-0.3px" }}><span style={{ opacity: 0.5, marginRight: 8 }}>📋</span>求职申请看板</h1>
          <p style={{ fontSize: 12, color: P.textMuted, margin: "4px 0 0 0" }}>拖拽卡片更新阶段 · 点击卡片编辑详情</p>
        </div>
        <button onClick={() => { if (confirm("确认重置所有数据为示例数据？")) setApps(SAMPLE_DATA); }}
          style={{ padding: "6px 12px", borderRadius: 6, border: `1px solid ${P.border}`, background: "transparent", color: P.textMuted, fontSize: 11, cursor: "pointer", fontFamily: FONT }}>重置示例数据</button>
      </div>
      <StatsDashboard apps={apps} />
      <FilterBar filter={filter} setFilter={setFilter} sortBy={sortBy} setSortBy={setSortBy} searchQuery={searchQuery} setSearchQuery={setSearchQuery} />
      <div style={{ display: "flex", gap: 16, overflowX: "auto", paddingBottom: 20, minHeight: 400 }}>
        {DEFAULT_COLUMNS.map(col => <KanbanColumn key={col.id} column={col} apps={filteredApps.filter(a => a.stage === col.id)} onCardClick={setSelectedApp} onDrop={handleDrop} onDragStart={setDraggingId} onAddClick={handleAdd} />)}
      </div>
      {selectedApp && (<><Backdrop onClick={() => setSelectedApp(null)} /><DetailPanel app={selectedApp} onClose={() => setSelectedApp(null)} onSave={handleSave} onDelete={handleDelete} /></>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JobTracker />);
</script>
</body>
</html>
